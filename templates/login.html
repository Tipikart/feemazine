{% extends "base.html" %}
{% block titre %}Connexion — Fée Mazine{% endblock %}
{% block contenu %}

<h2>Connexion</h2>

<p class="texte-secondaire">Connectez-vous avec votre email et mot de passe pour accéder au programme Fée Mazine.</p>

<form method="post" action="/login" style="max-width: 380px;">
    <label>Adresse email
        <input type="email" name="email" required autofocus>
    </label>
    <label>Mot de passe
        <input type="password" name="mot_de_passe" required>
    </label>
    <button type="submit" class="bouton-primaire bouton-primaire-pleine-largeur" style="margin-top: 4px;">Se connecter</button>
</form>

{% endblock %}
